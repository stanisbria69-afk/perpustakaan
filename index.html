<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Perpustakaan Daerah Malaka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .card-export { background: white; padding: 20px; border: 1px solid #cbd5e1; width: 324px; height: 204px; display: flex; flex-direction: column; justify-content: space-between; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white p-6 flex flex-col">
        <h1 class="text-lg font-bold mb-8 text-yellow-400 border-b border-slate-700 pb-4">
            <i class="fas fa-book-open mr-2"></i>PERPUSDA MALAKA
        </h1>
        <nav class="space-y-3 flex-1">
            <a href="#" onclick="showPage('dashboard')" class="block py-2 px-3 rounded hover:bg-slate-800"><i class="fas fa-chart-line mr-3"></i>Dashboard</a>
            <a href="#" onclick="showPage('anggota')" class="block py-2 px-3 rounded hover:bg-slate-800"><i class="fas fa-users mr-3"></i>Data Anggota</a>
            <a href="#" onclick="showPage('katalog')" class="block py-2 px-3 rounded hover:bg-slate-800"><i class="fas fa-book mr-3"></i>Katalog Buku</a>
            <a href="#" onclick="showPage('galeri')" class="block py-2 px-3 rounded hover:bg-slate-800"><i class="fas fa-images mr-3"></i>Galeri Foto</a>
            <a href="#" onclick="showPage('pengaturan')" class="block py-2 px-3 rounded hover:bg-slate-800"><i class="fas fa-cog mr-3"></i>Pengaturan Admin</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        
        <section id="page-dashboard" class="space-y-6">
            <h2 class="text-2xl font-bold">Dashboard Analitik</h2>
            <div class="grid grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl shadow border border-slate-100">Statistik Kunjungan: 128</div>
                <div class="bg-white p-4 rounded-xl shadow border border-slate-100">Total Koleksi: 242</div>
            </div>
            <canvas id="chartUtama" class="max-h-60"></canvas>
        </section>

        <section id="page-anggota" class="hidden">
            <h2 class="text-xl font-bold mb-4">Manajemen Anggota</h2>
            <div id="area-kartu" class="card-export mb-4">
                <h3 class="font-bold text-sm uppercase">Kartu Perpustakaan Malaka</h3>
                <div class="text-xs space-y-1">
                    <p>Nama: <span id="nama-kartu">-</span></p>
                    <p>NIK: <span id="nik-kartu">-</span></p>
                </div>
            </div>
            <button onclick="unduhKartu()" class="bg-red-600 text-white px-4 py-2 rounded text-sm"><i class="fas fa-download mr-2"></i>Unduh Kartu PDF</button>
        </section>

        <section id="page-galeri" class="hidden">
            <h2 class="text-xl font-bold mb-4">Galeri Perpustakaan</h2>
            <div id="grid-foto" class="grid grid-cols-3 gap-4">
                </div>
        </section>

        <section id="page-pengaturan" class="hidden">
            <h2 class="text-xl font-bold mb-4">Profil & Keamanan Admin</h2>
            <div class="bg-white p-6 rounded-lg border max-w-sm">
                <form class="space-y-4">
                    <input type="text" placeholder="Username Baru" class="w-full p-2 border rounded">
                    <input type="password" placeholder="Password Baru" class="w-full p-2 border rounded">
                    <button class="bg-slate-900 text-white w-full py-2 rounded">Simpan Perubahan</button>
                </form>
            </div>
        </section>

    </main>

    <script>
        function showPage(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
        }

        async function unduhKartu() {
            const el = document.getElementById('area-kartu');
            const canvas = await html2canvas(el);
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('l', 'mm', [85.6, 54]);
            pdf.addImage(imgData, 'PNG', 0, 0, 85.6, 54);
            pdf.save("Kartu-Anggota.pdf");
        }

        // Inisialisasi Chart
        new Chart(document.getElementById('chartUtama'), {
            type: 'line',
            data: { labels: ['Jan', 'Feb', 'Mar'], datasets: [{ data: [50, 70, 90], borderColor: '#EAB308' }] }
        });
    </script>
</body>
</html>
